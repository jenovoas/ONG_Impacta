version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: impacta-db
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=impacta
      - POSTGRES_USER=impacta
      - POSTGRES_PASSWORD=impacta_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: impacta-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
