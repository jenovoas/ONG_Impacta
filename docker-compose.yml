services:
  postgres:
    image: postgres:16-alpine
    container_name: impacta-db
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=impacta
      - POSTGRES_USER=impacta
      - POSTGRES_PASSWORD=impacta_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impacta -d impacta"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: impacta-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data:z
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: impacta-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://impacta:impacta_pass@postgres:5432/impacta?schema=public
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  landing:
    image: localhost/ong_impacta_landing:latest
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: impacta-landing
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.impacta-landing-http.rule=Host(`impacta.pinguinoseguro.cl`)"
      - "traefik.http.routers.impacta-landing-http.entrypoints=web"
      - "traefik.http.routers.impacta-landing-http.middlewares=https-redirect@file"
      - "traefik.http.routers.impacta-landing.rule=Host(`impacta.pinguinoseguro.cl`)"
      - "traefik.http.routers.impacta-landing.entrypoints=websecure"
      - "traefik.http.routers.impacta-landing.tls.certresolver=powerdns"
      - "traefik.http.services.impacta-landing.loadbalancer.server.port=3000"
    restart: unless-stopped

networks:
  default:
  proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
